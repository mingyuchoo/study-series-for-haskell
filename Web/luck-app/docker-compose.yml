services:
  db:
    image: postgres:16-alpine
    container_name: luck-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: luck
      POSTGRES_PASSWORD: luck
      POSTGRES_DB: luck
    ports:
      - "5432:5432"
    volumes:
      - luck-pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luck -d luck"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  luck-pgdata:
