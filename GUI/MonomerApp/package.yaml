name:                MonomerApp
version:             0.1.0.0
#synopsis:
#description:
homepage:            https://github.com/githubuser/MonomerApp#readme
license:             BSD3
author:              Author name here
maintainer:          example@example.com
copyright:           2021 Author name here
#category:
extra-source-files:
- README.md

default-extensions:
- OverloadedStrings

library:
  source-dirs:      src
  dependencies:
  - base >= 4.7 && < 5
  - lens
  - monomer
  - text-show
  ghc-options:
  - -Wall

executables:
  app:
    source-dirs:      app
    main:             Main.hs
    dependencies:
    - base >= 4.7 && < 5
    - MonomerApp
    ghc-options:
    - -Wall
    - -fwarn-incomplete-patterns
    - -threaded
