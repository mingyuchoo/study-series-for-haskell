name:                fzh
version:             0.1.0.0
github:              mingyuchoo/fzh
license:             BSD-3-Clause
author:              Mingyu Choo
maintainer:          mingyuchoo@gmail.com
copyright:           Mingyu Choo 2025
synopsis:            Haskell로 작성된 퍼지 파인더 TUI 애플리케이션
category:            Tools
description:         Brick 라이브러리 기반의 터미널 퍼지 파인더. fzf와 유사한 기능을 제공하며 Emacs/Vim 키바인딩을 지원합니다.

extra-source-files:
- README.md
- CHANGELOG.md

dependencies:
- base >= 4.18 && < 5
- brick
- containers
- directory
- filepath
- flow
- fuzzy
- microlens
- microlens-th
- mtl
- parallel
- text
- time
- vector
- vty
- vty-unix
- unix
- yaml

default-extensions:
- DataKinds
- DeriveGeneric
- ExplicitForAll
- GADTs
- KindSignatures
- StandaloneKindSignatures
- OverloadedStrings
- TemplateHaskell
- TypeApplications

ghc-options:
- -Wall
- -O2
- -haddock

language: GHC2024

library:
  source-dirs: src
  exposed-modules:
    - Lib
    - Config
    - Types
    - Fuzzy
    - Event
    - UI
    - Vty
    - FileSearch

executables:
  fzh-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -dynamic
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - fzh

tests:
  fzh-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -dynamic
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - fzh
    - hspec
    - doctest
    - doctest-discover
